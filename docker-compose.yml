# docker-compose.yml
#
# Since you're connecting to an EXISTING PostgreSQL database,
# you only need to run the Memgraph services here.
# Just put your real DB credentials in .env — no postgres container needed.
#
# Usage:
#   docker compose up -d          # start Memgraph + Lab
#   docker compose down -v        # stop and wipe graph data

services:

  # ── Target: Memgraph MAGE ─────────────────────────────────────────────────
  # memgraph-mage = Memgraph + graph algorithm modules (PageRank, community
  # detection, centrality, path algorithms, …) — a strict superset of the
  # plain memgraph image, recommended for knowledge graph projects.
  #
  # Healthcheck uses bash /dev/tcp (built-in) — nc is not in the image.
  memgraph:
    image: memgraph/memgraph-mage:latest
    container_name: memgraph-mage
    pull_policy: always
    ports:
      - "${MEMGRAPH_BOLT_PORT:-7687}:7687"   # Bolt — GraFlo connects here
      - "${MEMGRAPH_HTTP_PORT:-7444}:7444"   # HTTP monitoring
    volumes:
      - mg_data:/var/lib/memgraph
      - mg_log:/var/log/memgraph
    command: ["--log-level=WARNING"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/7687' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20        # up to 100 s total
      start_period: 10s  # ignore failures during initial boot

  # ── Memgraph Lab (browser UI → http://localhost:3000) ─────────────────────
  lab:
    image: memgraph/lab:latest
    container_name: memgraph-lab
    pull_policy: always
    ports:
      - "${MEMGRAPH_LAB_PORT:-3000}:3000"
    environment:
      - QUICK_CONNECT_MG_HOST=memgraph
      - QUICK_CONNECT_MG_PORT=7687
    depends_on:
      memgraph:
        condition: service_healthy   # wait for bolt port to be open

volumes:
  mg_data:
  mg_log: